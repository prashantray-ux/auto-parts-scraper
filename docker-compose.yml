version: '3'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auto_parts
    ports:
      - '5432:5432'

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  app:
    build: .
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgres://user:password@db:5432/auto_parts
